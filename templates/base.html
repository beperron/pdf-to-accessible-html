<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Document{% endblock %}</title>
    <style>
{{ css_inline }}
    </style>
    <script>
    MathJax = {
        tex: {
            inlineMath: [['\\(', '\\)']],
            displayMath: [['\\[', '\\]']]
        },
        options: {
            enableMenu: true,
            menuOptions: {
                settings: {
                    assistiveMml: true
                }
            }
        },
        loader: {load: ['[a11y]/explorer']}
    };
    </script>
    <script src="{{ mathjax_cdn }}" async></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    {% block body %}{% endblock %}
</body>
</html>
